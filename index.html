<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vox DC - 2026 Election Tracker</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
          background: #F1EFE8; margin: 0; padding: 2rem 1rem; color: #2C2C2A; }
  .page { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .subtitle { color: #5F5E5A; font-size: 13px; margin-top: 0; margin-bottom: 2rem; }
  .race-card { background: #fff; border: 1px solid #D3D1C7; border-radius: 12px;
                padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; }
  .race-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .chamber { font-size: 17px; font-weight: 600; margin: 0; }
  .date { font-size: 12px; color: #5F5E5A; margin: 2px 0 0; }
  .badges { display: flex; gap: 6px; flex-wrap: wrap; }
  .badge { font-size: 11px; padding: 4px 10px; border-radius: 6px; white-space: nowrap; }
  .badge-empty { background: #F1EFE8; color: #888780; }
  .candidates { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  @media (max-width: 560px) { .candidates { grid-template-columns: 1fr; } }
  .candidate { background: #F9F8F5; border-radius: 8px; padding: 12px; }
  .candidate-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; background: #E6F1FB; color: #0C447C;
             display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 12px; flex-shrink: 0; }
  .name { font-weight: 600; font-size: 13px; margin: 0; }
  .role { font-size: 11px; color: #5F5E5A; margin: 0; }
  .background { font-size: 12px; line-height: 1.5; margin: 0 0 8px; }
  .storyline { font-size: 12px; line-height: 1.5; margin: 0 0 4px; }
  .sources { font-size: 11px; margin: 0 0 8px; }
  .sources a { color: #185FA5; }
  .chips { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  .chip { font-size: 10px; background: #fff; border: 1px solid #D3D1C7; padding: 2px 8px; border-radius: 12px; color: #5F5E5A; }
  .finance { width: 100%; font-size: 12px; }
  .finance td { padding: 2px 0; }
  .finance td:last-child { text-align: right; }
  .section-label { font-size: 11px; color: #5F5E5A; margin: 0 0 5px; border-top: 1px solid #D3D1C7; padding-top: 10px; }
  .polling { width: 100%; font-size: 12px; }
  .footer-note { font-size: 11px; color: #888780; margin: 10px 0 0; }
  .muted { font-size: 12px; color: #888780; }
  .generated { font-size: 11px; color: #888780; text-align: center; margin-top: 2rem; }
</style>
</head>
<body>
<div class="page">
  <h1>Vox DC &mdash; 2026 election tracker</h1>
  <p class="subtitle">Internal tracker. Not for external distribution without review.</p>
  <p class="muted">No races added yet.</p>
  <p class="generated">Site generated Jul 7, 2026 6:55 PM ET</p>
</div>
</body>
</html>
